<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erandix Auto Connect</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f7f7f7; color: #333; padding: 0; transition: background 0.3s, color 0.3s; }

    h1 { text-align: center; padding: 15px 10px; font-size: 1.5rem; background: #0077cc; color: #fff; transition: background 0.3s, color 0.3s; }

    /* Tabs */
    .tab-container { display: flex; background: #eee; position: relative; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: bold; position: relative; transition: background 0.3s, color 0.3s; }
    .tab.active { background: #0077cc; color: #fff; }
    .tab-badge { position: absolute; top: 5px; right: 15px; background: red; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; display: none; }

    /* Tab content */
    .tab-content { display: none; padding: 10px; overflow: hidden; }
    .tab-content.active { display: block; }

    /* SMS List */
    #sms-list { max-height: 40vh; overflow-y: auto; background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); transition: background 0.3s, color 0.3s; }
    .sms-item { border-bottom: 1px solid #ddd; padding: 8px; transition: background 0.5s, color 0.3s; }
    .sms-item.new { background: #d4f0ff; }
    .sms-number { font-weight: bold; font-size: 0.95rem; }
    .sms-message { margin: 3px 0; font-size: 0.9rem; word-break: break-word; }
    .sms-date { font-size: 0.75rem; color: #666; }

    /* Pull-to-refresh */
    #pull-refresh { text-align: center; padding: 10px; color: #0077cc; display: none; font-weight: bold; }

    /* USSD Result */
    #ussd-result { max-height: 30vh; overflow-y: auto; background: #fff; padding: 10px; border-radius: 10px; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); margin-top: 10px; font-size: 0.9rem; transition: background 0.3s, color 0.3s; }

    /* Toast Notification */
    #toast { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #0077cc; color: #fff; padding: 10px 15px; border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); display: none; z-index: 999; font-size: 0.9rem; transition: background 0.3s, color 0.3s; }

    /* Form Inputs */
    .form-group { background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: background 0.3s, color 0.3s; }
    .form-group h2 { font-size: 1.1rem; margin-bottom: 8px; }
    input, textarea, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; }
    button { background: #0077cc; color: #fff; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s, color 0.3s; }
    button:hover { background: #005fa3; }

    /* Dark Mode */
    body.dark { background: #1e1e1e; color: #ddd; }
    body.dark h1 { background: #0d5fa3; color: #fff; }
    body.dark .tab-container { background: #333; }
    body.dark .tab { color: #ccc; }
    body.dark .tab.active { background: #0d5fa3; color: #fff; }
    body.dark #sms-list, body.dark #ussd-result, body.dark .form-group { background: #2b2b2b; color: #ddd; }
    body.dark .sms-item { border-bottom: 1px solid #555; color: #ddd; }
    body.dark #toast { background: #0d5fa3; color: #fff; }
    body.dark input, body.dark textarea, body.dark select { background: #3b3b3b; color: #ddd; border: 1px solid #555; }

    /* Responsive */
    @media (max-width: 480px) {
        h1 { font-size: 1.3rem; padding: 12px 8px; }
        input, textarea, select, button { font-size: 0.95rem; padding: 8px; }
        .sms-number { font-size: 0.9rem; }
        .sms-message { font-size: 0.85rem; }
        .sms-date { font-size: 0.7rem; }
    }
</style>
</head>
<body>

<h1>Erandix Auto Connect</h1>

<!-- Dark Mode Toggle -->
<div style="text-align:center; margin:10px;">
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
</div>

<!-- Tabs -->
<div class="tab-container">
    <div class="tab active" onclick="showTab('sms-tab')">SMS <span id="sms-badge" class="tab-badge">0</span></div>
    <div class="tab" onclick="showTab('ussd-tab')">USSD</div>
    <div class="tab" onclick="showTab('tools-tab')">Tools</div>
</div>

<!-- SMS Tab -->
<div id="sms-tab" class="tab-content active">
    <div id="pull-refresh">Pull to refresh...</div>
    <div id="sms-list"></div>
</div>

<!-- USSD Tab -->
<div id="ussd-tab" class="tab-content">
    <div class="form-group">
        <h2>Run USSD</h2>
        <input type="text" id="ussd-code" placeholder="Enter USSD Code (e.g., *123#)">
        <select id="ussd-sim">
            <option value="0">SIM 1</option>
            <option value="1">SIM 2</option>
        </select>
        <button onclick="runUSSD()">Run USSD</button>
    </div>
    <div id="ussd-result"></div>
</div>

<!-- Tools Tab -->
<div id="tools-tab" class="tab-content">
    <div class="form-group">
        <h2>Send SMS</h2>
        <input type="text" id="sms-number" placeholder="Phone Number">
        <textarea id="sms-message" rows="3" placeholder="Message"></textarea>
        <select id="sms-sim">
            <option value="0">SIM 1</option>
            <option value="1">SIM 2</option>
        </select>
        <button onclick="sendSMS()">Send SMS</button>
    </div>

    <div class="form-group">
        <h2>Tools</h2>
        <input type="text" id="external-url" placeholder="Open URL">
        <button onclick="openExternal()">Open URL</button>
        <input type="color" id="bar-color" value="#0077cc">
        <button onclick="changeSystemBarsColor()">Change System Bars Color</button>
        <button onclick="reloadApp()">Reload App</button>
    </div>
</div>

<!-- Toast for notifications -->
<div id="toast"></div>

<script>
// ---------------- Dark Mode ----------------
function toggleDarkMode() {
    document.body.classList.toggle('dark');
}

// ---------------- Tabs Logic ----------------
function showTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    const tab = Array.from(document.querySelectorAll('.tab')).find(t => t.textContent.toLowerCase().includes(tabId.split('-')[0]));
    if(tab) tab.classList.add('active');
    document.getElementById(tabId).classList.add('active');
    if(tabId === 'sms-tab') {
        document.getElementById('sms-badge').style.display = 'none';
        newSmsCount = 0;
    }
}

// ---------------- IndexedDB Setup ----------------
let db;
let newSmsCount = 0;
let request = indexedDB.open('smsDB', 1);

request.onupgradeneeded = function(e) {
    db = e.target.result;
    if (!db.objectStoreNames.contains('sms')) {
        let store = db.createObjectStore('sms', { keyPath: 'id' });
        store.createIndex('number', 'number', { unique: false });
    }
};

request.onsuccess = function(e) { db = e.target.result; loadSMSFromDB(); };
request.onerror = function(e) { console.error('IndexedDB error:', e); };

// ---------------- SMS Functions ----------------
function addSmsToIndexedDB(id, number, message, date, showToast=true) {
    if (!db) return;
    let tx = db.transaction('sms', 'readwrite');
    let store = tx.objectStore('sms');
    store.put({ id, number, message, date });
    tx.oncomplete = function() { loadSMSFromDB(true, id, showToast); };
    tx.onerror = function(e) { console.error('DB add error:', e); };
}

function loadSMSFromDB(highlightNew=false, newId=null, showToast=true) {
    if (!db) return;
    let tx = db.transaction('sms', 'readonly');
    let store = tx.objectStore('sms');
    let request = store.getAll();
    request.onsuccess = function(e) {
        let smsList = e.target.result;
        smsList.sort((a,b) => a.date - b.date);
        let container = document.getElementById('sms-list');
        container.innerHTML = '';
        smsList.forEach(sms => {
            let div = document.createElement('div');
            div.className = 'sms-item';
            if(highlightNew && sms.id === newId) {
                div.classList.add('new');
                newSmsCount++;
                document.getElementById('sms-badge').style.display = 'inline-block';
                document.getElementById('sms-badge').textContent = newSmsCount;
                if(showToast) showToastMessage(`New SMS from ${sms.number}`);
            }
            div.innerHTML = `<div class="sms-number">${sms.number}</div>
                             <div class="sms-message">${sms.message}</div>
                             <div class="sms-date">${new Date(sms.date).toLocaleString()}</div>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
        if(highlightNew && newId) {
            let newElem = container.querySelector('.sms-item.new');
            if(newElem) setTimeout(() => newElem.classList.remove('new'), 2000);
        }
    };
}

// ---------------- Toast Notification ----------------
function showToastMessage(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.display = 'block';
    toast.style.opacity = 1;
    setTimeout(() => { toast.style.opacity = 0; }, 3000);
    setTimeout(() => { toast.style.display = 'none'; }, 3500);
}

// ---------------- Pull-to-refresh ----------------
let startY = 0, isPulling = false;
const pullRefresh = document.getElementById('pull-refresh');
const smsList = document.getElementById('sms-list');

smsList.addEventListener('touchstart', e => { if(smsList.scrollTop === 0) startY = e.touches[0].pageY; });
smsList.addEventListener('touchmove', e => {
    let y = e.touches[0].pageY;
    if(smsList.scrollTop === 0 && y - startY > 30) { isPulling = true; pullRefresh.style.display = 'block'; }
});
smsList.addEventListener('touchend', e => {
    if(isPulling) { loadSMSFromDB(); pullRefresh.style.display = 'none'; isPulling = false; }
});

// ---------------- USSD Result ----------------
function showResult(message) {
    const container = document.getElementById('ussd-result');
    const div = document.createElement('div');
    div.textContent = new Date().toLocaleTimeString() + ": " + message;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    showToastMessage(message);
}

// ---------------- JS Bridge ----------------
function showNewSMS(id, number, message, date) { addSmsToIndexedDB(id, number, message, date); }
function sendSMS() {
    const number = document.getElementById('sms-number').value;
    const message = document.getElementById('sms-message').value;
    const simSlot = parseInt(document.getElementById('sms-sim').value);
    if(number && message) AndroidUSSD.sendSMS(number, message, simSlot);
}
function runUSSD() {
    const code = document.getElementById('ussd-code').value;
    const simSlot = parseInt(document.getElementById('ussd-sim').value);
    if(code) AndroidUSSD.runUssd(code, simSlot);
}
function changeSystemBarsColor() {
    const color = document.getElementById('bar-color').value;
    AndroidUSSD.setSystemBarsColor(color);
}
function reloadApp() { AndroidUSSD.reloadApp(); }
function openExternal() {
    const url = document.getElementById('external-url').value;
    if(url) AndroidUSSD.openExternal(url);
}
</script>
</body>
</html>
