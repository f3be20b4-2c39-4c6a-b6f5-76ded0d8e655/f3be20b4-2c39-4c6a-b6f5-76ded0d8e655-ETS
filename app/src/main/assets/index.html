<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>USSD Manager</title>

<style>
/* RESET */
*{ margin:0; padding:0; box-sizing:border-box; }

/* BODY */
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:#1e293b;
  padding:16px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:100;
}

/* CONTAINER */
.container{
  padding:12px;
  max-width:100%;
  margin:auto;
}

/* CARD */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:14px;
}

/* CARD TITLES */
.card h2{
  font-size:16px;
  margin-bottom:10px;
  color:#38bdf8;
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:12px;
  font-size:15px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

/* BUTTONS */
button{
  width:100%;
  padding:13px;
  font-size:15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
button:active{ transform:scale(0.96); }

/* QUICK GRID */
.quick{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.quick button{ background:#3b82f6; }

/* RESULT BOX */
.result{
  background:black;
  border-radius:8px;
  padding:10px;
  height:150px;
  overflow:auto;
  font-size:13px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:12px;
  font-size:12px;
  opacity:0.7;
}

/* TABLET RESPONSIVE */
@media(min-width:600px){
  .container{ max-width:600px; }
  .quick{ grid-template-columns:1fr 1fr 1fr 1fr; }
  button{ font-size:16px; }
}

/* DESKTOP RESPONSIVE */
@media(min-width:900px){
  .container{ max-width:700px; }
  .card h2{ font-size:18px; }
  button{ font-size:16px; padding:14px; }
}
</style>
</head>

<body>

<header>USSD Manager Dashboard</header>

<div class="container">

<!-- RUN USSD -->
<div class="card">
<h2>Run USSD</h2>
<input id="ussdCode" placeholder="Enter USSD code e.g *123#">
<button onclick="runUSSD()">Run USSD</button>
</div>

<!-- QUICK COMMANDS -->
<div class="card">
<h2>Quick Commands</h2>
<div class="quick">
<button onclick="quick('*100#')">Balance</button>
<button onclick="quick('*165#')">Mobile Money</button>
<button onclick="quick('*150#')">Bundles</button>
<button onclick="quick('*123#')">Menu</button>
</div>
</div>

<!-- SEND SMS -->
<div class="card">
<h2>Send SMS</h2>
<input id="phone" placeholder="Phone number">
<textarea id="message" rows="3" placeholder="Type message"></textarea>
<button onclick="sendSMS()">Send SMS</button>
</div>

<!-- SYSTEM -->
<div class="card">
<h2>System</h2>
<button onclick="reloadApp()">Reload App</button>
</div>

<!-- LOGS -->
<div class="card">
<h2>Logs</h2>
<div id="result" class="result"></div>
</div>

</div>

<footer>USSD Web Manager</footer>

<script>
// LOG FUNCTION
function log(msg){
  let box = document.getElementById("result");
  box.innerHTML += msg + "<br>";
  box.scrollTop = box.scrollHeight;
}

// RUN USSD
function runUSSD(){
  let code = document.getElementById("ussdCode").value;
  if(!code){ alert("Enter USSD code"); return; }
  log("Running USSD: " + code);
  if(window.AndroidUSSD){ AndroidUSSD.runUssd(code); }
  else{ log("Android bridge not detected"); }
}

// QUICK USSD
function quick(code){
  log("Running: " + code);
  if(window.AndroidUSSD){ AndroidUSSD.runUssd(code); }
}

// SEND SMS
function sendSMS(){
  let phone = document.getElementById("phone").value;
  let message = document.getElementById("message").value;
  if(!phone || !message){ alert("Enter phone and message"); return; }
  log("Sending SMS to " + phone);
  if(window.AndroidUSSD){ AndroidUSSD.sendSms(phone,message); }
}

// RELOAD WEBVIEW
function reloadApp(){
  log("Reloading App");
  if(window.AndroidUSSD){ AndroidUSSD.reloadPage(); }
}

// CALLED FROM JAVA
function showResult(msg){
  log("RESULT: " + msg);
}
</script>

</body>
</html>
