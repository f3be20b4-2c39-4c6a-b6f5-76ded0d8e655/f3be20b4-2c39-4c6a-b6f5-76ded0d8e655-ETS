<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Erandix</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4a90e2, #50e3c2);
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 0.2em;
    }

    p {
      font-size: 1.2em;
      margin: 0.5em 0;
    }

    #clock {
      font-size: 2em;
      margin-top: 1em;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      margin: 15px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 80%;
      max-width: 400px;
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>

  <h1>Erandix Connection Auto</h1>
  <p>Erandix Connection Panel</p>

  <div class="card">
    <p><strong>App Version:</strong> 1.0.0</p>
    <p><strong>Status:</strong> Running in foreground</p>
    <p><strong>Hotspot:</strong> Enabled if available</p>
  </div>

  <div class="card">
    <p>Enjoy a simple dashboard</p>
    <p>with live clock below:</p>
    <div id="clock"></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2,'0');
      const minutes = String(now.getMinutes()).padStart(2,'0');
      const seconds = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('clock').textContent = hours + ":" + minutes + ":" + seconds;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
