<!DOCTYPE html>
<html>
<head>
    <title>USSD & SMS WebView</title>
    <script>
        function displayUSSD(msg) {
            document.getElementById("ussd").innerText = msg;
        }
        function displaySMS(msg) {
            document.getElementById("sms").innerText = msg;
        }
    </script>
</head>
<body>
    <h2>USSD Response:</h2>
    <div id="ussd">Waiting...</div>

    <h2>Latest SMS:</h2>
    <div id="sms">Waiting...</div>
</body>
</html>
