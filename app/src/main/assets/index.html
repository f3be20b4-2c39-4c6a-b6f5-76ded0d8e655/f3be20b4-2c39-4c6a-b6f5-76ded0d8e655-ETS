<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USSD Manager</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    margin:0;
    color:white;
}

header{
    background:#1e293b;
    padding:15px;
    font-size:20px;
    text-align:center;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
}

h2{
    margin-top:0;
    color:#38bdf8;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:10px;
    border-radius:6px;
    border:none;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.result{
    background:black;
    padding:10px;
    height:150px;
    overflow:auto;
    border-radius:6px;
    font-size:13px;
}

.quick{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.quick button{
    background:#3b82f6;
}

footer{
    text-align:center;
    padding:10px;
    font-size:12px;
    opacity:0.6;
}

</style>
</head>

<body>

<header>
USSD Manager Dashboard
</header>

<div class="container">

<!-- USSD SECTION -->
<div class="card">

<h2>Run USSD</h2>

<input id="ussdCode" placeholder="Enter USSD Code e.g *123#">

<button onclick="runUSSD()">Run USSD</button>

</div>

<!-- QUICK USSD -->
<div class="card">

<h2>Quick USSD</h2>

<div class="quick">

<button onclick="quick('*100#')">Balance</button>
<button onclick="quick('*165#')">Mobile Money</button>
<button onclick="quick('*150#')">Bundles</button>
<button onclick="quick('*123#')">Menu</button>

</div>

</div>

<!-- SMS SECTION -->
<div class="card">

<h2>Send SMS</h2>

<input id="phone" placeholder="Phone Number">

<textarea id="message" placeholder="Type Message"></textarea>

<button onclick="sendSMS()">Send SMS</button>

</div>

<!-- SYSTEM -->
<div class="card">

<h2>System</h2>

<button onclick="reloadApp()">Reload App</button>

</div>

<!-- RESULT -->
<div class="card">

<h2>Logs / Results</h2>

<div id="result" class="result"></div>

</div>

</div>

<footer>
USSD Web Manager
</footer>

<script>

function log(msg){
    let box = document.getElementById("result")
    box.innerHTML += msg + "<br>"
    box.scrollTop = box.scrollHeight
}

function runUSSD(){

    let code = document.getElementById("ussdCode").value

    if(!code){
        alert("Enter USSD Code")
        return
    }

    log("Running USSD: "+code)

    if(window.AndroidUSSD){
        AndroidUSSD.runUssd(code)
    }else{
        log("Android bridge not detected")
    }

}

function quick(code){

    log("Running: "+code)

    if(window.AndroidUSSD){
        AndroidUSSD.runUssd(code)
    }

}

function sendSMS(){

    let phone = document.getElementById("phone").value
    let message = document.getElementById("message").value

    if(!phone || !message){
        alert("Enter phone and message")
        return
    }

    log("Sending SMS to "+phone)

    if(window.AndroidUSSD){
        AndroidUSSD.sendSms(phone,message)
    }

}

function reloadApp(){

    log("Reloading WebView")

    if(window.AndroidUSSD){
        AndroidUSSD.reloadPage()
    }

}

function showResult(message){

    log("RESULT: "+message)

}

</script>

</body>
</html>
